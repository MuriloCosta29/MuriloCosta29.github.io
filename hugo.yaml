title: Murilo Costa
baseURL: https://murilocosta29.github.io/

enableRobotsTXT: true
enableGitInfo: true

module:
  imports:
    - path: github.com/imfing/hextra

menu:
  main:
    - name: Blog
      pageRef: /
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 4
      url: "https://github.com/MuriloCosta29"
      params:
        icon: github
    - name: Theme
      weight: 5
      params:
        type: theme-toggle

params:
  description: "Computer Science student documenting the path to DevOps Engineer."

  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: false

  editURL:
    enable: false

  blog:
    list:
      displayTags: true

  page:
    width: normal

  markup:
  goldmark:
    extensions:
      typographer:
        disable: true
